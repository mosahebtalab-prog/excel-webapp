<!DOCTYPE html>
<html>
<head>
    <title>Excel Web App</title>
</head>
<body>

<h2>ثبت اطلاعات</h2>

<form method="POST" action="/add">
    <input name="name" placeholder="نام">
    <input name="phone" placeholder="تلفن">
    <button type="submit">ثبت</button>
</form>

<hr>

<h3>لیست داده‌ها</h3>

<table border="1">
    <tr>
        <th>ID</th>
        <th>نام</th>
        <th>تلفن</th>
    </tr>

    {% for row in data %}
    <tr>
        <td>{{ row.id }}</td>
        <td>{{ row.name }}</td>
        <td>{{ row.phone }}</td>
    </tr>
    {% endfor %}
</table>

</body>
</html>
